name: Build ARGUS APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Create Gradle project
        run: |
          gradle init --type basic --dsl kotlin --project-name ARGUS --no-comments
          rm -rf app
          mkdir -p app/src/main/java/com/bossgilbert/argus
          mkdir -p app/src/main/res/values app/src/main/res/mipmap-xxxhdpi
          
          cat > settings.gradle.kts << 'EOF'
          rootProject.name = "ARGUS"
          include(":app")
          EOF
          
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.4.0"
              id("org.jetbrains.kotlin.android") version "1.9.22"
          }
          android {
              namespace = "com.bossgilbert.argus"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.bossgilbert.argus"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = "1.8" }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
          
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_blue_eye"
                  android:label="ARGUS">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > app/src/main/java/com/bossgilbert/argus/MainActivity.kt << 'EOF'
          package com.bossgilbert.argus
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
              }
          }
          EOF
          
          base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_blue_eye.png << 'EOF'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPh
