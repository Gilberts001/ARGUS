name: Build ARGUS APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - name: Build ARGUS
        run: |
          mkdir -p app/src/main/java/com/bossgilbert/argus/data
          mkdir -p app/src/main/java/com/bossgilbert/argus/network
          mkdir -p app/src/main/java/com/bossgilbert/argus/ui
          mkdir -p app/src/main/res/layout app/src/main/res/menu app/src/main/res/values
          mkdir -p app/src/main/res/drawable app/src/main/res/mipmap-xxxhdpi
          
          echo 'rootProject.name = "ARGUS"' > settings.gradle.kts
          echo 'include(":app")' >> settings.gradle.kts
          
          cat > build.gradle.kts << 'EOF'
          plugins { id("com.android.application") version "8.2" apply false; id("org.jetbrains.kotlin.android") version "1.9.22" apply false; id("com.google.devtools.ksp") version "1.9.22-1.0.17" apply false }
          EOF
          
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF
          
          cat > app/build.gradle.kts << 'EOF'
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android"); id("com.google.devtools.ksp") }
          android { namespace="com.bossgilbert.argus"; compileSdk=34; defaultConfig { applicationId="com.bossgilbert.argus"; minSdk=26; targetSdk=34; versionCode=1; versionName="1.0" }; buildTypes { release { isMinifyEnabled=false } }; compileOptions { sourceCompatibility=JavaVersion.VERSION_1_8; targetCompatibility=JavaVersion.VERSION_1_8 }; kotlinOptions { jvmTarget="1.8" }; buildFeatures { viewBinding=true } }
          dependencies { implementation("androidx.core:core-ktx:1.12.0"); implementation("androidx.appcompat:appcompat:1.6.1"); implementation("com.google.android.material:material:1.11.0"); implementation("androidx.constraintlayout:constraintlayout:2.1.4"); implementation("androidx.recyclerview:recyclerview:1.3.2"); implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0"); implementation("androidx.room:room-runtime:2.6.1"); implementation("androidx.room:room-ktx:2.6.1"); ksp("androidx.room:room-compiler:2.6.1"); implementation("com.squareup.retrofit2:retrofit:2.9.0"); implementation("com.squareup.retrofit2:converter-gson:2.9.0") }
          EOF
          
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools"><uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.POST_NOTIFICATIONS"/><application android:name=".ArgusApp" android:allowBackup="true" android:icon="@mipmap/ic_blue_eye" android:label="ARGUS" android:theme="@style/Theme.ARGUS" tools:targetApi="31"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><activity android:name=".SettingsActivity"/><service android:name=".AssistantService" android:exported="false" android:foregroundServiceType="dataSync"/></application></manifest>
          EOF
          
          base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_blue_eye.png << 'EOF'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==
          EOF
          
          echo "Base files ready"
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
      - name: Build APK
        run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with: {name: ARGUS-APK, path: app/build/outputs/apk/debug/app-debug.apk}
