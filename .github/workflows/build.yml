name: Build ARGUS APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/bossgilbert/argus
          mkdir -p app/src/main/res/values app/src/main/res/mipmap-xxxhdpi
          
          cat > settings.gradle.kts << 'EOF'
          rootProject.name = "ARGUS"
          include(":app")
          EOF
          
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.4.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF
          
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF
          
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.bossgilbert.argus"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.bossgilbert.argus"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = "1.8" }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
          
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_blue_eye"
                  android:label="ARGUS"
                  android:theme="@style/Theme.Material3.DayNight">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > app/src/main/java/com/bossgilbert/argus/MainActivity.kt << 'EOF'
          package com.bossgilbert.argus
          import androidx.appcompat.app.AppCompatActivity
          import android.os.Bundle
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(android.R.layout.simple_list_item_1)
              }
          }
          EOF
          
          base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_blue_eye.png << 'EOF'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==
          EOF
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Build APK
        run: gradle assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARGUS-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
